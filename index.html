<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TavelPlay - Track games, goals, and player statistics">
    <title>TavelPlay</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#808080">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar - Standings Table (25%) -->
        <aside class="standings-sidebar">
            <h2>Standings</h2>
            <div class="standings-table-container">
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>GW/GP</th>
                            <th>Pts</th>
                            <th>G</th>
                            <th>A</th>
                            <th>🎩</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
            <div class="logo-container">
                <img src="tavelplay.svg" alt="TavelPlay" class="logo-image">
            </div>
        </aside>

        <!-- Right Main Area (75%) -->
        <main class="main-content">
            <!-- Player Entries Screen -->
            <div id="screen-player-entries" class="screen active">
                <h1 id="player-entries-title">Player Entries</h1>
                <div class="player-entries-content" id="player-entries-content">
                    <div class="player-entry-form">
                        <input type="text" id="player-name-input" placeholder="Enter player name" maxlength="30">
                        <button id="add-player-btn" class="btn-primary">Add Player</button>
                    </div>
                    <div class="player-entry-form">
                        <select id="recurring-player-select" class="player-name-input-style">
                            <option value="">Recurring players…</option>
                        </select>
                        <span class="player-entry-recurring-spacer"></span>
                    </div>
                    <div class="player-list" id="player-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
                <div class="settings-panel" id="settings-panel" style="display: none;">
                    <h2>Settings</h2>
                    <div class="settings-container">
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Assists</span>
                                <input type="checkbox" id="setting-assists-enabled" class="toggle-switch">
                                <span class="toggle-status" id="assists-status">ON</span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Enable max score</span>
                                <input type="checkbox" id="setting-max-score-enabled" class="toggle-switch">
                                <span class="toggle-status" id="max-score-enabled-status">OFF</span>
                            </label>
                            <div class="max-score-selector-container" id="max-score-selector-container" style="display: none;">
                                <label for="setting-max-score-value">Max score:</label>
                                <select id="setting-max-score-value" class="max-score-selector">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5" selected>5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Disable pig award</span>
                                <input type="checkbox" id="setting-pig-award-enabled" class="toggle-switch">
                                <span class="toggle-status" id="pig-award-status">NO</span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Random Teams</span>
                                <input type="checkbox" id="setting-random-teams-enabled" class="toggle-switch">
                                <span class="toggle-status" id="random-teams-status">ON</span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Goalkeepers</span>
                                <input type="checkbox" id="setting-goalkeepers-enabled" class="toggle-switch">
                                <span class="toggle-status" id="goalkeepers-status">NO</span>
                            </label>
                        </div>
                        <div class="goalkeepers-list-container" id="goalkeepers-list-container" style="display: none;">
                            <label for="goalkeeper-name-input">Goalkeeper name:</label>
                            <div class="goalkeeper-entry-form">
                                <input type="text" id="goalkeeper-name-input" placeholder="Enter goalkeeper name" maxlength="30">
                                <button id="add-goalkeeper-btn" class="btn-primary">Add Goalkeeper</button>
                            </div>
                            <div class="goalkeeper-list" id="goalkeeper-list">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <span>Enable starting lineup</span>
                                <input type="checkbox" id="setting-starting-lineup-enabled" class="toggle-switch">
                                <span class="toggle-status" id="starting-lineup-status">OFF</span>
                            </label>
                            <div class="starting-lineup-count-container" id="starting-lineup-count-container" style="display: none;">
                                <label for="setting-starting-lineup-count">Number of players:</label>
                                <select id="setting-starting-lineup-count" class="max-score-selector">
                                    <option value="3">3vs3</option>
                                    <option value="4">4vs4</option>
                                    <option value="5" selected>5vs5</option>
                                    <option value="6">6vs6</option>
                                    <option value="7">7vs7</option>
                                    <option value="8">8vs8</option>
                                    <option value="9">9vs9</option>
                                    <option value="10">10vs10</option>
                                    <option value="11">11vs11</option>
                                </select>
                            </div>
                        </div>
                        <div class="setting-item">
                            <div class="recurring-players-header">
                                <h3>Recurring players</h3>
                                <button type="button" id="recurring-manage-toggle-btn" class="btn-secondary">MANAGE</button>
                            </div>
                            <div id="recurring-players-manage" class="recurring-players-manage" style="display: none;">
                                <label for="recurring-player-name-input">Add recurring player:</label>
                                <div class="goalkeeper-entry-form">
                                    <input type="text" id="recurring-player-name-input" placeholder="Enter name" maxlength="30">
                                    <button type="button" id="add-recurring-player-btn" class="btn-primary">Add</button>
                                </div>
                                <div class="goalkeeper-list" id="recurring-players-list">
                                    <!-- Populated by JavaScript -->
                                </div>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label for="setting-black-team-name">Left Side Team:</label>
                            <select id="setting-black-team-name" class="max-score-selector">
                                <option value="BLACK TEAM">BLACK TEAM</option>
                                <option value="WHITE TEAM">WHITE TEAM</option>
                                <option value="BLUE TEAM">BLUE TEAM</option>
                                <option value="RED TEAM">RED TEAM</option>
                                <option value="YELLOW TEAM">YELLOW TEAM</option>
                                <option value="GREEN TEAM">GREEN TEAM</option>
                                <option value="ORANGE TEAM">ORANGE TEAM</option>
                                <option value="PURPLE TEAM">PURPLE TEAM</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label for="setting-white-team-name">Right Side Team:</label>
                            <select id="setting-white-team-name" class="max-score-selector">
                                <option value="BLACK TEAM">BLACK TEAM</option>
                                <option value="WHITE TEAM">WHITE TEAM</option>
                                <option value="BLUE TEAM">BLUE TEAM</option>
                                <option value="RED TEAM">RED TEAM</option>
                                <option value="YELLOW TEAM">YELLOW TEAM</option>
                                <option value="GREEN TEAM">GREEN TEAM</option>
                                <option value="ORANGE TEAM">ORANGE TEAM</option>
                                <option value="PURPLE TEAM">PURPLE TEAM</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-footer">
                        <button id="back-from-settings-btn" class="btn-secondary">Back</button>
                        <button id="reset-all-data-settings-btn" class="btn-secondary">Reset All Data</button>
                    </div>
                </div>
                <div class="screen-footer">
                    <button id="settings-btn" class="btn-secondary">Settings</button>
                    <button id="continue-btn" class="btn-primary" disabled>Continue</button>
                </div>
            </div>

            <!-- Team Selection Screen -->
            <div id="screen-team-selection" class="screen">
                <h1>Team Selection</h1>
                <div class="teams-container">
                    <div class="team-section team-black">
                        <h2>BLACK TEAM</h2>
                        <div class="team-players" id="black-team-players">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>
                    <div class="team-section team-white">
                        <h2>WHITE TEAM</h2>
                        <div class="team-players" id="white-team-players">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>
                </div>
                <div class="screen-footer">
                    <button id="back-to-game-btn" class="btn-primary" style="display: none;">Back to Game</button>
                    <button id="back-to-entries-btn" class="btn-secondary">Back</button>
                    <button id="rematch-btn" class="btn-secondary" style="display: none;">Rematch</button>
                    <button id="edit-teams-btn" class="btn-secondary">Edit Teams</button>
                    <button id="swap-sides-btn" class="btn-secondary">Swap Sides</button>
                    <button id="finish-session-team-selection-btn" class="btn-secondary">Finish Session</button>
                    <button id="start-game-btn" class="btn-primary">Start Game</button>
                </div>
            </div>

            <!-- Game In Progress Screen -->
            <div id="screen-game-progress" class="screen">
                <h1>Game In Progress</h1>
                <div class="score-display">
                    <div class="score-team score-black">
                        <div class="score-label">BLACK</div>
                        <div class="score-value" id="black-score">0</div>
                    </div>
                    <div class="score-team score-white">
                        <div class="score-label">WHITE</div>
                        <div class="score-value" id="white-score">0</div>
                    </div>
                </div>
                <div class="goal-buttons">
                    <button id="black-goal-btn" class="goal-btn goal-btn-black">BLACK GOAL</button>
                    <button id="white-goal-btn" class="goal-btn goal-btn-white">WHITE GOAL</button>
                </div>
                <div class="screen-footer">
                    <button id="back-to-team-selection-btn" class="btn-secondary" style="display: none;">Back</button>
                    <button id="view-teams-btn" class="btn-secondary">View Teams</button>
                    <button id="undo-goal-btn" class="btn-secondary" disabled>Undo last goal</button>
                    <button id="end-game-btn" class="btn-secondary">End Game</button>
                </div>
            </div>

            <!-- Goal Registration Modal -->
            <div id="modal-goal-registration" class="modal">
                <div class="modal-content">
                    <h2 id="modal-team-name">Register Goal</h2>
                    <div class="goal-registration-list" id="goal-registration-list">
                        <!-- Populated by JavaScript -->
                    </div>
                    <div class="modal-footer">
                        <button id="cancel-goal-btn" class="btn-secondary">Back</button>
                        <button id="register-goal-btn" class="btn-primary" disabled>Register</button>
                    </div>
                </div>
            </div>

            <!-- Game Summary Screen -->
            <div id="screen-game-summary" class="screen">
                <h1>Game Summary</h1>
                <div class="final-score-display">
                    <div class="final-score-team">
                        <div class="final-score-label">BLACK</div>
                        <div class="final-score-value" id="final-black-score">0</div>
                    </div>
                    <div class="final-score-separator">-</div>
                    <div class="final-score-team">
                        <div class="final-score-label">WHITE</div>
                        <div class="final-score-value" id="final-white-score">0</div>
                    </div>
                </div>
                <div class="decisive-goal-display" id="decisive-goal-display" style="display: none;">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="goals-timeline">
                    <h3>Goals</h3>
                    <div id="goals-timeline-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
                <div class="screen-footer">
                    <button id="finish-session-btn" class="btn-secondary">Finish Session</button>
                    <button id="view-games-btn" class="btn-secondary">View/Edit Games</button>
                    <button id="proceed-btn" class="btn-primary">Next Game</button>
                </div>
            </div>

            <!-- Games History Screen -->
            <div id="screen-games-history" class="screen">
                <h1>Games Played</h1>
                <div class="games-history-container">
                    <div id="games-history-list" class="games-history-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
                <div class="screen-footer">
                    <button id="games-history-back-btn" class="btn-secondary">Back</button>
                </div>
            </div>

            <!-- Today's Stats Screen -->
            <div id="screen-todays-stats" class="screen">
                <div id="todays-stats-export-area">
                    <h1>Today's Stats</h1>
                    <div class="full-standings-container">
                        <table class="full-standings-table">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Player</th>
                                    <th>Awards</th>
                                    <th>GW/GP</th>
                                    <th>Pts</th>
                                    <th>G</th>
                                    <th>A</th>
                                </tr>
                            </thead>
                            <tbody id="full-standings-body">
                                <!-- Populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    <p id="team-wins-summary" class="team-wins-summary" aria-live="polite"></p>
                </div>
                <div class="screen-footer">
                    <button id="reset-all-data-btn" class="btn-secondary">Reset All Data</button>
                    <button id="export-png-btn" class="btn-secondary">Export PNG</button>
                    <button id="view-gk-stats-btn" class="btn-secondary">View GK stats</button>
                    <button id="continue-session-btn" class="btn-primary">Continue Session</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
